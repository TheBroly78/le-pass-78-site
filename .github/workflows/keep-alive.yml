name: Garder l'API éveillée

# Ping régulier de l'API pour éviter la mise en veille du backend (Render free).
# Public repo → minutes Actions gratuites illimitées.
on:
  schedule:
    - cron: '*/10 * * * *' # toutes les ~10 minutes
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /api/health
        run: curl -fsS --max-time 60 https://le-pass-78-api.onrender.com/api/health || true
